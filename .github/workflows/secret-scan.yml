name: Secret Scan

on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Scan tracked files for obvious secrets
        run: |
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          patterns = {
              "aws_access_key": re.compile(r"AKIA[0-9A-Z]{16}"),
              "private_key": re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              "generic_api_key": re.compile(r"(?i)(api[_-]?key|secret|token)\s*[:=]\s*['\"][A-Za-z0-9_\-]{24,}['\"]"),
          }
          allowlisted = {
              ".github/workflows/secret-scan.yml",
              "docs/deployment.md",
          }
          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          findings = []
          for file_name in files:
              if file_name in allowlisted:
                  continue
              path = Path(file_name)
              if path.suffix.lower() in {".png", ".pdf", ".docx", ".twb"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for name, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append(f"{file_name}: {name}")
          if findings:
              raise SystemExit("Potential secrets found:\n" + "\n".join(findings))
          print("No obvious secrets found.")
          PY
